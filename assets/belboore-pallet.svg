<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background-color: #02040A; border-radius: 12px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Header -->
  <text x="40" y="50" fill="#FFFFFF" font-size="22" font-weight="bold" letter-spacing="1">BELBOORE</text>
  <text x="40" y="75" fill="#71717A" font-size="14" font-weight="500">Tech Blue &amp; Cyan Color Palette</text>
  <text x="760" y="50" fill="#00D4FF" font-size="12" font-weight="bold" text-anchor="end" letter-spacing="2">HIGH-SPEED NETWORK</text>

  <!-- Group 1: Primary Accents -->
  <g transform="translate(40, 110)">
    <!-- Primary Tech Blue -->
    <rect width="160" height="180" rx="10" fill="#0052FF" />
    <text x="15" y="130" fill="#FFFFFF" font-size="15" font-weight="bold">Tech Blue</text>
    <text x="15" y="150" fill="#E2DBFF" font-size="12">Primary Accent</text>
    <text x="15" y="168" fill="#FFFFFF" font-size="11" font-family="monospace">#0052FF</text>

    <!-- Glowing Cyan -->
    <rect x="180" width="160" height="180" rx="10" fill="#00D4FF" />
    <text x="195" y="130" fill="#02040A" font-size="15" font-weight="bold">Electric Cyan</text>
    <text x="195" y="150" fill="#0052FF" font-size="12">Interactive Glow</text>
    <text x="195" y="168" fill="#02040A" font-size="11" font-family="monospace">#00D4FF</text>
  </g>

  <!-- Group 2: Canvas Shades -->
  <g transform="translate(400, 110)">
    <!-- Ice Slate Light -->
    <rect width="160" height="180" rx="10" fill="#FAF9FC" stroke="#242429" stroke-width="1"/>
    <text x="15" y="130" fill="#02040A" font-size="15" font-weight="bold">Ice-Slate</text>
    <text x="15" y="150" fill="#71717A" font-size="12">Canvas Light</text>
    <text x="15" y="168" fill="#02040A" font-size="11" font-family="monospace">#FAF9FC</text>

    <!-- Deep Space Navy Dark -->
    <rect x="180" width="160" height="180" rx="10" fill="#0B132B" stroke="#1C2541" stroke-width="2"/>
    <text x="195" y="130" fill="#FFFFFF" font-size="15" font-weight="bold">Deep Navy</text>
    <text x="195" y="150" fill="#71717A" font-size="12">Canvas Dark</text>
    <text x="195" y="168" fill="#FFFFFF" font-size="11" font-family="monospace">#0B132B</text>
  </g>

  <!-- Group 3: Utility & Surfaces -->
  <g transform="translate(40, 320)">
    <!-- Slate Gray Surface -->
    <rect width="210" height="110" rx="8" fill="#1C2541" stroke="#242429" stroke-width="1" />
    <text x="15" y="65" fill="#FFFFFF" font-size="14" font-weight="bold">Slate Card Base</text>
    <text x="15" y="82" fill="#00D4FF" font-size="11" font-family="monospace">#1C2541</text>

    <!-- Subdued Muted Background -->
    <rect x="230" width="210" height="110" rx="8" fill="#02040A" stroke="#1C2541" stroke-width="1" />
    <text x="245" y="65" fill="#FFFFFF" font-size="14" font-weight="bold">Obsidian Base</text>
    <text x="245" y="82" fill="#71717A" font-size="11" font-family="monospace">#02040A</text>
  </g>
</svg>
